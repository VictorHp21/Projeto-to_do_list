<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja bem-vindo!</title>

    <link rel="stylesheet" href="../../Estilos/loginStyle.css">

    <link rel="stylesheet" href="../../Estilos/mediaQuerriesLogin.css">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>

<body>

    <main>

        <section id="login-cadastro">

            <div class="btn-login-cadastro">
                <button id="btnCadastrar">Cadastrar</button>
                <button id="btnLogar">Já tenho uma conta</button>
            </div>

            <section id="login">

            

            <div id="img">

            </div>

            <!--div da área total-->

            <div id="container-forms">
                  <!--formulário Login-->

            <div class="form-box" id="form-login">
                <h1>LOGIN</h1>
                <p>Seja bem-vindo! <br>
                    Faça login para acessar sua lista de tarefas.
                </p>

                <form class="forms"  action="" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="iconMail">
                            <i class="fa-solid fa-at"></i>
                        </span>
                        <input type="email" id="loginM" placeholder="Seu e-mail">

                    </div>

                    <div class="campo">
                        <span class="iconSenha">
                            <i class="fa-solid fa-key"></i>
                        </span>
                        <input type="password" name="senha" id="isenha" placeholder="Sua senha">
                    </div>
                    <input type="submit" value="Entrar" id="btn-entrar"> 
                    <a href="esqueciSenha.html" class="botao" id="btn-esqueci">Esqueci minha senha</a>
                </form>
            </div>

            <!--Formulário cadastro-->

            <div class="form-box" id="form-cadas">
                <h1>CADASTRAR</h1>
                <p>Crie uma conta para organizar suas tarefas</p>

                <form class="forms" autocomplete="on" action="
                ">
                    <div class="campo">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Seu nome">
                    </div>
                    <div class="campo">
                        <i class="fa-solid fa-at"></i>
                        <input type="email" placeholder="Seu e-mail">
                    </div>
                    <div class="campo">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" placeholder="Crie uma senha">
                    </div>

                    <input type="submit" value="Cadastrar" id="btn-entrar">
                   
                </form>
            </div>
            </div>

          

        </section>

        </section>

       

        
    </main>

    <script src="../codePgLogin/script.js"></script>

</body>

</html>
