<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>

    <link rel="stylesheet" href="../../Estilos/main.css">
</head>

<body>

    <main>
        <h1>lista de tarefas</h1>

        <!--Seção adc tarefa-->
        <section class="addLista">


            <div class="add-task" id="area-tarefa">
                <p>Adicionar tarefa</p>

                <span id="title" class="hide">Titulo:
                    <input type="text"  id="titulo">
                </span>
                

                <textarea name="" id="taskArea" class="hide"></textarea>
                <div id="dataArea" class="hide">
                    <span id="">DATA: </span>
                    <input type="date" name="" id="date-input">

                    <button id="btn-voltar" onclick="voltaTarefa()">
                        < VOLTAR</button>

                            <button id="btn-Tarefa" onclick="adicionarTarefa()">ADD LISTA</button>




                </div>


            </div>

            <!-- Botão adiocionar tarefa -->
            <div tabindex="0" id="btn-add" class="plusButton" onclick="mostrarTarefa()">
                <svg class="plusIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
                    <g mask="url(#mask0_21_345)">
                        <path d="M13.75 23.75V16.25H6.25V13.75H13.75V6.25H16.25V13.75H23.75V16.25H16.25V23.75H13.75Z">
                        </path>
                    </g>
                </svg>
            </div>

        </section>

        <br>
        <hr>


        <section class="suas-tarefas">
            <h1>Suas tarefas</h1>

            <div class="task-cards">

               




                


                  <div class="task-card">

                    <div class="task-content">

                        <h1 class="task-title">JS titulo</h1>

                        <p class="task-text">
                            Estudar JavaScript e terminar projeto de lista de tarefas
                        </p>
                    </div>

                    <div class="task-footer">

                        <span class="task-date">
                            📅 10/03/2026
                        </span>

                        <span class="task-status">
                            <button class="btn-status pendente" id="btn-status-m" onclick="mostrarMenuStatus(this)"></button>
                            
                            <span class="task-status-text">Pendente</span>

                            <div class="status-menu hide" id="status-menu">
                                <button onclick="setStatus(this, 'feito')">Finalizar</button>
                                <button onclick="setStatus(this, 'pendente')">Pendente</button>
                                <button onclick="setStatus(this, 'atraso')">Em Atraso</button>
                            </div>

                        </span>

                        <button class="btn-custom-remove">Excluir Tarefa</button>

                    </div>

                </div>
                


            </div>


        </section>

    </main>


    <script src="script.js"></script>
</body>

</html>
